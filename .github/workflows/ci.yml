name: CI
on: push

permissions:
  issues: write
  checks: write
  contents: write
  pull-requests: write

env:
  TYPE: ${{ endsWith(github.ref_name, 'main') && 'release' || (endsWith(github.ref_name, 'beta') && 'beta' || 'dev') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: '⬇️ Checkout'
        uses: actions/checkout@v5

      - name: '☕ Setup Jdk 25'
        uses: actions/setup-java@v5
        with:
          cache: 'gradle'
          cache-dependency-path: |
            versions/*.properties
            *.properties
            *.gradle.kts
          java-version: 25
          check-latest: true
          distribution: 'temurin'

      - name: '🛂 Setup Gradle'
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/beta' && github.ref != 'refs/heads/dev' }}
          validate-wrappers: true

      - name: '🔓 Adjust the release permissions'
        run: chmod a+x ./scripts/release.sh && chmod +x ./gradlew

      - name: Use Node.js 25
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 25

      - name: '🔎 Determine version'
        id: get-next-version
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          # extra_plutins: semantic-release-discord-notifier
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            conventional-changelog-conventionalcommits
            semantic-release-export-data

      - name: 'ℹ️ Needs Release?'
        run: echo "Needs release published? ${{ steps.get-next-version.outputs.new_release_published == 'true' }}"

      - name: '🏗️ Build, Test & Release'
        if: ${{ steps.get-next-version.outputs.new_release_published == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DO_PUBLISH: steps.get-next-version.outputs.new_release_published
          DRY_RUN: ${{ vars.DRY_RUN }}
          MODRINTH_ID: ${{ vars.MODRINTH_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_SLUG: ${{ vars.CURSEFORGE_SLUG }}
          CURSEFORGE_ID: ${{ vars.CURSEFORGE_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          # DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: ${{ vars.DRY_RUN != 'false' }}
          # extra_plugins: semantic-release-discord-notifier
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            conventional-changelog-conventionalcommits
            semantic-release-export-data

      - name: '🧪 Run Dev Build'
        if: ${{ steps.get-next-version.outputs.new_release_published != 'true' }}
        # run: ./gradlew chiseledGameTest chiseledBuildAndCollect --stacktrace
        run: ./gradlew chiseledBuild --stacktrace

      - name: '🕵️‍♂️ Collect jars'
        uses: actions/upload-artifact@v5
        with:
          name: Artifacts
          path: |
            versions/*/build/libs/*.jar
